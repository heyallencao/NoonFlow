name: Bug report
description: Report a reproducible bug or installation problem
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps
      placeholder: |
        1. Open ...
        2. Click ...
        3. See error ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include your setup details
      placeholder: |
        - CairnStack version:
        - macOS version:
        - Claude Code installed: yes / no
        - Codex installed: yes / no
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Screenshots or logs
      description: Paste anything useful here

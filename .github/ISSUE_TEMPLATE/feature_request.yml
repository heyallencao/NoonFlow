name: Feature request
description: Suggest a product or workflow improvement
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: Proposed idea
      description: What would you like NoonFlow to do?
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why it matters
      description: Why would this improve the workflow?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add examples, screenshots, or related tools if useful
